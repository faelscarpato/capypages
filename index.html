
<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scarpato | Visual Experience Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#f07000',
            'primary-glow': 'rgba(240, 112, 0, 0.4)',
            midnight: '#050A14',
            'teal-accent': '#00bfa5',
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Noto Sans', 'sans-serif'],
          },
          animation: {
            'cursor-blink': 'cursor-blink 1s step-end infinite',
            'monitor-flicker': 'monitor-flicker 0.15s infinite',
            'float': 'float 6s ease-in-out infinite',
            'glitch': 'glitch 0.3s ease-in-out infinite alternate',
          },
          keyframes: {
            'cursor-blink': { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0' } },
            'monitor-flicker': { '0%, 100%': { opacity: '0.98' }, '50%': { opacity: '1' }, '25%': { opacity: '0.99' }, '75%': { opacity: '0.97' } },
            'float': { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
            'glitch': {
              '0%': { transform: 'translate(0)' },
              '20%': { transform: 'translate(-2px, 1px)' },
              '40%': { transform: 'translate(-2px, -1px)' },
              '60%': { transform: 'translate(2px, 1px)' },
              '80%': { transform: 'translate(2px, -1px)' },
              '100%': { transform: 'translate(0)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #050A14;
      color: white;
      scrollbar-width: thin;
      scrollbar-color: #333 #050A14;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #050A14; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #f07000; }

    .grain-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.04;
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise.png');
    }

    .crt-overlay {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Scroll Reveal Animations */
    .reveal {
      opacity: 0;
      transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal-up { transform: translateY(40px); }
    .reveal-down { transform: translateY(-40px); }
    .reveal-left { transform: translateX(40px); }
    .reveal-right { transform: translateX(-40px); }
    
    .reveal.active {
      opacity: 1;
      transform: translate(0, 0);
    }

    .stagger-1 { transition-delay: 100ms; }
    .stagger-2 { transition-delay: 200ms; }
    .stagger-3 { transition-delay: 300ms; }
    .stagger-4 { transition-delay: 400ms; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="font-body selection:bg-primary selection:text-white">
  <div class="grain-overlay"></div>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
